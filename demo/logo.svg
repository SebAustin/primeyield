<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2030"/>
      <stop offset="1" stop-color="#121319"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#65B3AE"/>
      <stop offset="1" stop-color="#6E56CF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- app-icon tile -->
  <rect x="0" y="0" width="480" height="480" rx="104" fill="url(#bg)"/>
  <rect x="6" y="6" width="468" height="468" rx="98" fill="none" stroke="#2c3242" stroke-width="2"/>

  <!-- verified-growth mark: a checkmark whose tail shoots up into an arrow -->
  <g fill="none" stroke="url(#mark)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M150 232 L205 290 L344 138"/>
    <!-- arrowhead at the top end -->
    <path d="M300 140 L344 138 L342 184"/>
  </g>

  <!-- wordmark -->
  <text x="240" y="408" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="58" font-weight="800" fill="#F2F4F8" letter-spacing="-1">PrimeYield<tspan fill="#65B3AE">.</tspan></text>
</svg>
